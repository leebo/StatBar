name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build and Test
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Build
        run: |
          swift build -c release
          echo "✓ Build successful"
      
      - name: Check Swift Format
        run: |
          # 检查代码格式（可选）
          # swiftformat --lint .
          echo "✓ Format check skipped"
