name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build without tag'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build macOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Get Version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="dev-$(date +%Y%m%d)"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"
      
      - name: Build App
        run: |
          VERSION=${{ steps.version.outputs.version }}
          
          # Build release version
          swift build -c release
          
          # Create app bundle structure
          mkdir -p StatBar.app/Contents/MacOS
          mkdir -p StatBar.app/Contents/Resources
          
          # Copy executable
          cp .build/release/StatBar StatBar.app/Contents/MacOS/StatBar
          
          # Copy Info.plist
          cp Sources/StatBar/Info.plist StatBar.app/Contents/Info.plist
          
          # Update version in Info.plist
          sed -i '' "s/1.0.0/${VERSION}/" StatBar.app/Contents/Info.plist
          
          # Generate and copy app icon
          cd Scripts
          python3 generate_icon.py
          cd ..
          
          # Create .icns from PNG icons
          mkdir -p icon.iconset
          cp Sources/StatBar/Assets/AppIcon.appiconset/icon_16x16.png icon.iconset/icon_16x16.png
          cp Sources/StatBar/Assets/AppIcon.appiconset/icon_32x32.png icon.iconset/icon_16x16@2x.png
          cp Sources/StatBar/Assets/AppIcon.appiconset/icon_32x32.png icon.iconset/icon_32x32.png
          cp Sources/StatBar/Assets/AppIcon.appiconset/icon_64x64.png icon.iconset/icon_32x32@2x.png
          cp Sources/StatBar/Assets/AppIcon.appiconset/icon_128x128.png icon.iconset/icon_128x128.png
          cp Sources/StatBar/Assets/AppIcon.appiconset/icon_256x256.png icon.iconset/icon_128x128@2x.png
          cp Sources/StatBar/Assets/AppIcon.appiconset/icon_256x256.png icon.iconset/icon_256x256.png
          cp Sources/StatBar/Assets/AppIcon.appiconset/icon_512x512.png icon.iconset/icon_256x256@2x.png
          cp Sources/StatBar/Assets/AppIcon.appiconset/icon_512x512.png icon.iconset/icon_512x512.png
          cp Sources/StatBar/Assets/AppIcon.appiconset/icon_1024x1024.png icon.iconset/icon_512x512@2x.png
          
          # Convert to .icns
          iconutil -c icns icon.iconset -o StatBar.app/Contents/Resources/AppIcon.icns
          
          # Update Info.plist to use the icon
          /usr/libexec/PlistBuddy -c "Set :CFBundleIconFile AppIcon" StatBar.app/Contents/Info.plist || true
          
          echo "App bundle created at StatBar.app"
          ls -la StatBar.app/Contents/MacOS/
          ls -la StatBar.app/Contents/Resources/
      
      - name: Create DMG
        run: |
          VERSION=${{ steps.version.outputs.version }}
          
          # Generate DMG background
          cd Scripts
          python3 generate_dmg_bg.py
          cd ..
          
          # Create temporary DMG folder
          DMG_DIR="dmg_temp"
          mkdir -p "$DMG_DIR"
          
          # Copy app to DMG folder
          cp -R StatBar.app "$DMG_DIR/"
          
          # Create Applications symlink
          ln -s /Applications "$DMG_DIR/Applications"
          
          # Create DMG with background
          hdiutil create -volname "StatBar" -srcfolder "$DMG_DIR" -ov -format UDRW temp.dmg
          
          # Mount DMG to set background and icon positions
          hdiutil attach temp.dmg -readwrite -mountpoint /Volumes/StatBar
          
          # Set background image
          mkdir -p /Volumes/StatBar/.background
          cp Sources/StatBar/Assets/dmg_background.png /Volumes/StatBar/.background/background.png
          cp Sources/StatBar/Assets/dmg_background@2x.png /Volumes/StatBar/.background/background@2x.png
          
          # Set icon positions using AppleScript
          osascript -e '
            tell application "Finder"
              tell disk "StatBar"
                open
                set current view of container window to icon view
                set toolbar visible of container window to false
                set statusbar visible of container window to false
                set bounds of container window to {100, 100, 760, 500}
                set theViewOptions to the icon view options of container window
                set arrangement of theViewOptions to not arranged
                set icon size of theViewOptions to 100
                set background picture of theViewOptions to file ".background:background.png"
                set position of item "StatBar.app" of container window to {180, 200}
                set position of item "Applications" of container window to {480, 200}
                close
                open
                update without registering applications
                delay 2
              end tell
            end tell
          '
          
          # Sync and unmount
          sync
          hdiutil detach /Volumes/StatBar
          
          # Convert to compressed DMG
          hdiutil convert temp.dmg -format UDZO -imagekey zlib-level=9 -o StatBar-${VERSION}.dmg
          
          # Cleanup
          rm -rf "$DMG_DIR" temp.dmg
          
          echo "DMG created: StatBar-${VERSION}.dmg"
          ls -la StatBar-*.dmg
      
      - name: Create ZIP
        run: |
          VERSION=${{ steps.version.outputs.version }}
          zip -r StatBar-${VERSION}.zip StatBar.app
          echo "ZIP created: StatBar-${VERSION}.zip"
          ls -la StatBar-*.zip
      
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: StatBar ${{ steps.version.outputs.version }}
          body: |
            StatBar ${{ steps.version.outputs.version }}
            
            macOS menu bar performance monitor
            
            ### System Requirements
            - macOS 13.0+ (Ventura)
            - Intel or Apple Silicon
            
            ### Features
            - CPU usage monitoring with history chart
            - Memory usage monitoring with pressure status
            - Disk space monitoring
            - Network speed monitoring
            - Battery status with cycle count
            - Temperature sensors (CPU, GPU, Battery)
            - Fan speed monitoring
            - Process list sorted by memory
            - 60-second history charts
            - Settings panel with customization
            - Launch at login support
          files: |
            StatBar-${{ steps.version.outputs.version }}.dmg
            StatBar-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
