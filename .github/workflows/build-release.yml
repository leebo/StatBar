name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build without tag'
        type: boolean
        default: false
permissions:
  contents: write

jobs:
  build:
    name: Build macOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Get Version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="dev-$(date +%Y%m%d)"
          else
            VERSION="${GITHUB_ref#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"
      
      - name: Build App
        run: |
          VERSION=${{ steps.version.outputs.version }}
          
          # Build release version
          swift build -c release
          
          # Create app bundle structure
          mkdir -p StatBar.app/Contents/MacOS
          mkdir -pStatBar.app/Contents/Resources
          
          # Copy executable
          cp .build/release/StatBar StatBar.app/Contents/MacOS/StatBar
          
          # Copy Info.plist
          cp Sources/StatBar/Info.plist StatBar.app/Contents/Info.plist
          
          # Update version in Info.plist
          sed -i '' "s/1.0.0/${VERSION}/" StatBar.app/Contents/Info.plist
          
          echo "App bundle created at StatBar.app"
          ls -la StatBar.app/Contents/MacOS/
      
      - name: Create DMG
        run: |
          VERSION=${{ steps.version.outputs.version }}
          
          # Create DMG
          hdiutil create -volname "StatBar ${VERSION}" -srcfolder StatBar.app-ov -format UDZO StatBar-${version}.dmg
          
          echo "DMG created: StatBar-${VERSION}.dmg"
          ls -la StatBar-*.dmg
      
      - name: Create ZIP
        run: |
          VERSION=${{ steps.version.outputs.version }}
          zip -r StatBar-${VERSION}.zip StatBar.app
          echo "ZIP created: StatBar-${version}.zip"
          ls -la StatBar-*.zip
      
      - name: Upload Release Assets
        id: upload-release-assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_token }}
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: StatBar ${{ steps.version.outputs.version }}
          body: |
            StatBar ${{ steps.version.outputs.version}}
            
            macOS menu bar performance monitor
            
            ### System Requirements
            - macOS 13.0+ (Ventura)
            - Intel or Apple Silicon
            
            ### Features
            - CPU usage monitoring with history chart
            - Memory usage monitoring with pressure status
            - Disk space monitoring
            - Network speed monitoring
            - Battery status with cycle count
            - Temperature sensors (CPU, GPU, Battery)
            - Fan speed monitoring
            - Process list sorted by memory
            - 60-second history charts
            - Settings panel with customization
            - Launch at login support
